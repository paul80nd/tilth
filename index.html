<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tilth.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilth</title>
    <meta
      name="description"
      content="A local-first almanac for everything you grow: a scannable one-page cheatsheet per plant, merged from your own sources, plus the month-by-month jobs for the garden you actually have."
    />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
